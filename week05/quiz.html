<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <h1>✅BASIC HTML & CSS QUIZ</h1>

    <main class="box">
        <Form class="box">
            <div class="quiz-item">
                <label for="q1">what does acronym Html stand for?</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-item box">
                <label for="q2">How do you select id attributes in css?</label>
                <textarea id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-item box">
                <label for="q3">which of the following is a valid Css comment?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>choose One...</option>
                    <option value="a">A. &lt;!-- This is a comment--&gt;</option>
                    <option value="b">B. /* This is a comment */ </option>
                    <option value="c">C. // This is a comment</option>
                </select>
            </div>
            <div class="quiz-item box">
                <label for="q4">What is the bottom margin given this declaration?</label>
                <code class="box">margin:10px 5px 15px;</code>
                <input type="number" id="q4" name="q4">
            </div>
            <button type="submit">Submit Quiz for Grading</button>
        </Form>
    </main>
    <footer>

    </footer>
</body>

</html>
